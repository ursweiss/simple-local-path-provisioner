repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: 'deploy/helm/.*/templates/.*\.yaml$'
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-mod-tidy
        name: go mod tidy check
        entry: sh -c 'cp go.mod /tmp/go.mod.bak && cp go.sum /tmp/go.sum.bak && go mod tidy && diff /tmp/go.mod.bak go.mod && diff /tmp/go.sum.bak go.sum; rc=$?; cp /tmp/go.mod.bak go.mod && cp /tmp/go.sum.bak go.sum; exit $rc'
        language: system
        pass_filenames: false

      - id: go-build
        name: go build
        entry: go build ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-test
        name: go test
        entry: go test ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: helm-lint
        name: helm lint
        entry: helm lint deploy/helm/simple-local-path-provisioner
        language: system
        files: 'deploy/helm/.*'
        pass_filenames: false
