apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "slpp.fullname" . }}-node
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slpp.labels" . | nindent 4 }}
    app.kubernetes.io/component: node
spec:
  selector:
    matchLabels:
      {{- include "slpp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: node
  template:
    metadata:
      labels:
        {{- include "slpp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: node
    spec:
      serviceAccountName: {{ include "slpp.nodeServiceAccountName" . }}
      priorityClassName: system-node-critical
      hostNetwork: false
      containers:
        # ── CSI driver (node mode) ────────────────────────────────────────────
        - name: driver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --mode=node
            - --driver-name={{ .Values.driver.name }}
            - --endpoint=unix:///csi/csi.sock
            - --base-path={{ .Values.basePath }}
            - --log-level={{ .Values.logLevel }}
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: backing-store
              mountPath: {{ .Values.basePath }}
              mountPropagation: Bidirectional
            - name: pods-mount-dir
              mountPath: /var/lib/kubelet/pods
              mountPropagation: Bidirectional
          {{- with .Values.node.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        # ── node-driver-registrar ─────────────────────────────────────────────
        - name: node-driver-registrar
          image: {{ .Values.sidecars.registrar.image }}
          args:
            - --csi-address=/csi/csi.sock
            - --kubelet-registration-path=/var/lib/kubelet/plugins/{{ .Values.driver.name }}/csi.sock
            - --v={{ .Values.logLevel }}
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration

      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/{{ .Values.driver.name }}
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: DirectoryOrCreate
        - name: backing-store
          hostPath:
            path: {{ .Values.basePath }}
            type: DirectoryOrCreate
        - name: pods-mount-dir
          hostPath:
            path: /var/lib/kubelet/pods
            type: DirectoryOrCreate
