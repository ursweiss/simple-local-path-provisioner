apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "slpp.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slpp.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "slpp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "slpp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "slpp.controllerServiceAccountName" . }}
      priorityClassName: system-cluster-critical
      containers:
        # ── CSI driver (controller mode) ──────────────────────────────────────
        - name: driver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --mode=controller
            - --driver-name={{ .Values.driver.name }}
            - --endpoint=unix:///csi/csi.sock
            - --base-path={{ .Values.basePath }}
            - --stale-timeout={{ .Values.staleTimeout }}
            - --allow-force-takeover={{ .Values.allowForceTakeover }}
            - --log-level={{ .Values.logLevel }}
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: backing-store
              mountPath: {{ .Values.basePath }}
          {{- with .Values.controller.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        # ── external-provisioner ──────────────────────────────────────────────
        - name: csi-provisioner
          image: {{ .Values.sidecars.provisioner.image }}
          args:
            - --csi-address=/csi/csi.sock
            - --v={{ .Values.logLevel }}
            - --feature-gates=Topology=false
            - --extra-create-metadata=true
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

        # ── external-attacher ─────────────────────────────────────────────────
        - name: csi-attacher
          image: {{ .Values.sidecars.attacher.image }}
          args:
            - --csi-address=/csi/csi.sock
            - --v={{ .Values.logLevel }}
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: backing-store
          hostPath:
            path: {{ .Values.basePath }}
            type: DirectoryOrCreate
